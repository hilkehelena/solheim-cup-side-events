<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Stakeholderdag · Solheim Cup 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,Helvetica,sans-serif;background:#f2f4f7;color:#323741;font-size:14px;line-height:1.5;}
.header{background:#002664;padding:0;}
.header-inner{max-width:960px;margin:0 auto;padding:20px 24px 0;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.header-logos{display:flex;align-items:center;gap:20px;padding-bottom:20px;}
.divider-v{width:1px;height:48px;background:rgba(255,255,255,.3);}
.header-title{padding-bottom:20px;text-align:right;}
.header-title h1{font-size:18px;font-weight:700;color:#fff;letter-spacing:.02em;line-height:1.3;}
.header-title .sub{font-size:12px;color:#CED9E5;margin-top:4px;font-weight:400;}
.gold-bar{background:#FFCC00;height:4px;}
.nav-strip{background:#323741;padding:8px 24px;display:flex;gap:20px;flex-wrap:wrap;max-width:960px;margin:0 auto;}
.nav-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#CED9E5;text-transform:uppercase;letter-spacing:.06em;}
.nav-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.page{max-width:960px;margin:0 auto;padding:24px 24px 60px;}
.section-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#003399;margin:18px 0 5px 80px;border-left:2px solid #FFCC00;padding-left:8px;}
.daypart{display:inline-flex;align-items:center;gap:8px;background:#002664;color:#FFCC00;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:6px 14px;border-radius:2px;margin:20px 0 10px 0;}
.row{display:flex;margin-bottom:3px;align-items:stretch;}
.tc{width:72px;flex-shrink:0;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:12px;padding-top:13px;}
.tc span{font-size:11px;font-weight:700;color:#003399;white-space:nowrap;}
.blocks{flex:1;display:flex;gap:6px;}
.block{flex:1;border-radius:3px;padding:11px 13px;}
.b-gray{background:#fff;border:1px solid #e0e3e9;border-left:3px solid #888;}
.b-navy{background:#e8ecf5;border-left:3px solid #002664;}
.b-amber{background:#fff8e1;border-left:3px solid #FFCC00;}
.block-title{font-size:13px;font-weight:700;color:#002664;margin-bottom:2px;}
.block-desc{font-size:11px;color:#5a5e6a;line-height:1.5;}
.block-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:2px;margin-top:5px;font-weight:700;margin-right:3px;text-transform:uppercase;letter-spacing:.04em;}
.badge-navy{background:#002664;color:#FFCC00;}
.badge-gold{background:#FFCC00;color:#002664;}
.badge-gray{background:#CED9E5;color:#323741;}
.speaker{font-size:10px;color:#003399;margin-top:4px;font-weight:700;}
.pb{flex:1;border-radius:3px;padding:10px 11px;min-width:0;}
.pb-blue{background:#e8ecf5;border-top:3px solid #002664;}
.pb-red{background:#fdf0f3;border-top:3px solid #BB133E;}
.pb-gold{background:#fffbee;border-top:3px solid #FFCC00;}
.pb-title{font-size:12px;font-weight:700;color:#002664;margin-bottom:3px;}
.pb-desc{font-size:11px;color:#5a5e6a;line-height:1.45;}
.pb-foot{font-size:10px;color:#888;margin-top:4px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
.intro-split{display:flex;gap:6px;margin-top:0;}
.ih{flex:1;border-radius:3px;padding:8px 10px;}
.ih-blue{background:#e8ecf5;border-left:2px solid #003399;}
.ih-red{background:#fdf0f3;border-left:2px solid #BB133E;}
.ih-title{font-size:11px;font-weight:700;color:#002664;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.ih-desc{font-size:11px;color:#5a5e6a;line-height:1.4;}
.divider{height:1px;background:#dde1ea;margin:6px 0 6px 72px;}
.repeat-note{background:#fffbee;border:1px solid #FFCC00;border-radius:3px;padding:6px 12px;margin:4px 0 4px 72px;font-size:11px;color:#002664;font-weight:700;}
.trange{margin-left:72px;font-size:10px;color:#888;margin-top:3px;margin-bottom:1px;font-weight:700;}
.badge-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.bottom{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:28px;}
.card{background:#fff;border:1px solid #dde1ea;border-radius:3px;padding:16px 18px;border-top:3px solid #002664;}
.card h3{font-size:12px;font-weight:700;color:#002664;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;font-size:10px;font-weight:700;color:#fff;background:#002664;text-transform:uppercase;letter-spacing:.05em;padding:5px 7px;}
td{padding:5px 7px;color:#323741;border-bottom:1px solid #f0f2f5;vertical-align:top;}
tr:last-child td{border-bottom:none;}
.num{text-align:right;font-variant-numeric:tabular-nums;}
.total td{font-weight:700;background:#e8ecf5;border-top:2px solid #002664;border-bottom:none;}
.hl td{background:#fffbee;}
.note{font-size:10px;color:#888;margin-top:8px;line-height:1.5;}
.footer{background:#002664;margin-top:40px;}
.footer-inner{max-width:960px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.footer-inner span{font-size:10px;color:#CED9E5;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.footer-gold{width:100%;height:2px;background:#FFCC00;}
@media(max-width:600px){
  .bottom{grid-template-columns:1fr;}
  .blocks,.intro-split{flex-direction:column;}
  .header-inner{flex-direction:column;align-items:flex-start;}
  .header-title{text-align:left;}
}
</style>
</head>

      <div class="divider-v"></div>
